name: Turnos monitor

on:
  schedule:
    # 00:00 Europa Central (CET/CEST automático)
    - cron: "0 0 * * *"
      timezone: Europe/Berlin
  workflow_dispatch:
    inputs:
      command:
        description: Comando a ejecutar
        required: true
        default: window
        type: choice
        options:
          - window
          - once
          - pilot

concurrency:
  group: turnos-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    # window = 12 chequeos × 5 min ≈ 55 min de espera + llamadas API
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve command
        id: cmd
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.command }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=window" >> "$GITHUB_OUTPUT"
          fi

      - name: Prueba piloto (sin SMTP)
        if: steps.cmd.outputs.value == 'pilot'
        run: python -m turnos_monitor pilot

      - name: Chequeo de turnos
        if: steps.cmd.outputs.value != 'pilot'
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          TIMEZONE: Europe/Berlin
        run: python -m turnos_monitor ${{ steps.cmd.outputs.value }}
