name: Turnos monitor

on:
  schedule:
    # 00:00 hora de Roma — 1 chequeo; en modo weekly solo corre los lunes
    - cron: "0 0 * * *"
      timezone: Europe/Rome
  workflow_dispatch:
    inputs:
      frequency:
        description: Frecuencia del chequeo
        required: true
        default: daily
        type: choice
        options:
          - daily
          - weekly

concurrency:
  group: turnos-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    environment: LIVE
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolver frecuencia
        id: freq
        env:
          MONITOR_FREQUENCY: ${{ vars.MONITOR_FREQUENCY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.frequency }}" >> "$GITHUB_OUTPUT"
          elif [ -n "$MONITOR_FREQUENCY" ]; then
            echo "value=$MONITOR_FREQUENCY" >> "$GITHUB_OUTPUT"
          else
            echo "value=daily" >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluar si corresponde correr
        id: should_run
        env:
          TIMEZONE: Europe/Rome
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ steps.freq.outputs.value }}" = "weekly" ]; then
            DOW=$(TZ="$TIMEZONE" date +%u)
            if [ "$DOW" != "1" ]; then
              echo "run=false" >> "$GITHUB_OUTPUT"
              echo "Modo semanal: hoy no es lunes, salteando"
              exit 0
            fi
          fi

          echo "run=true" >> "$GITHUB_OUTPUT"

      - name: Validar secrets SMTP
        if: steps.should_run.outputs.run == 'true'
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          missing=()
          [ -z "$SMTP_USER" ] && missing+=("SMTP_USER")
          [ -z "$SMTP_PASSWORD" ] && missing+=("SMTP_PASSWORD")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Faltan secrets en el environment LIVE: ${missing[*]}. Settings → Environments → LIVE → Environment secrets"
            exit 1
          fi

      - name: Validar configuración SMTP
        if: steps.should_run.outputs.run == 'true'
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          CONSULATE: ${{ vars.CONSULATE }}
          MONITOR_FREQUENCY: ${{ steps.freq.outputs.value }}
          TIMEZONE: Europe/Rome
        run: |
          python -c "
          from turnos_monitor.config import load_settings
          s = load_settings()
          print(f'Config OK — consulado: {s.consulate_label}, destinatario: {s.notify_email}, frecuencia: {s.monitor_frequency}')
          "

      - name: Chequeo de turnos
        if: steps.should_run.outputs.run == 'true'
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          CONSULATE: ${{ vars.CONSULATE }}
          MONITOR_FREQUENCY: ${{ steps.freq.outputs.value }}
          TIMEZONE: Europe/Rome
        run: python -m turnos_monitor once
