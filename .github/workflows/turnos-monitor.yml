name: Turnos monitor

on:
  schedule:
    # Lunes 00:00 hora de Roma (CET/CEST automático) — 1 chequeo semanal
    - cron: "0 0 * * 1"
      timezone: Europe/Rome
  workflow_dispatch:
    inputs:
      command:
        description: Comando a ejecutar
        required: true
        default: once
        type: choice
        options:
          - once
          - window
          - pilot

concurrency:
  group: turnos-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    environment: LIVE
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve command
        id: cmd
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.command }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=once" >> "$GITHUB_OUTPUT"
          fi

      - name: Prueba piloto (sin SMTP)
        if: steps.cmd.outputs.value == 'pilot'
        run: python -m turnos_monitor pilot

      - name: Validar secrets SMTP
        if: steps.cmd.outputs.value != 'pilot'
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          missing=()
          [ -z "$SMTP_USER" ] && missing+=("SMTP_USER")
          [ -z "$SMTP_PASSWORD" ] && missing+=("SMTP_PASSWORD")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Faltan secrets en el environment LIVE: ${missing[*]}. Settings → Environments → LIVE → Environment secrets"
            exit 1
          fi

      - name: Validar configuración SMTP
        if: steps.cmd.outputs.value != 'pilot'
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          TIMEZONE: Europe/Rome
        run: |
          python -c "
          from turnos_monitor.config import load_settings
          s = load_settings()
          print(f'Config OK — destinatario: {s.notify_email}')
          "

      - name: Chequeo de turnos
        if: steps.cmd.outputs.value != 'pilot'
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          TIMEZONE: Europe/Rome
        run: python -m turnos_monitor ${{ steps.cmd.outputs.value }}
